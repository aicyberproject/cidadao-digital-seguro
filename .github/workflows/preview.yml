name: Preview Pull Request

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: preview-deploy
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pull request
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Checkout current ref
        if: github.event_name != 'pull_request'
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate content
        run: npm run validate:content

      - name: Build preview
        run: npm run build -- --base=/cidadao-digital-seguro-preview/

      - name: Checkout preview repository
        uses: actions/checkout@v4
        with:
          repository: aicyberproject/cidadao-digital-seguro-preview
          ref: main
          token: ${{ secrets.PREVIEW_DEPLOY_TOKEN }}
          path: preview-repo

      - name: Publish preview
        run: |
          find preview-repo -mindepth 1 -maxdepth 1 ! -name '.git' ! -name '.nojekyll' -exec rm -rf {} +
          cp -a dist/. preview-repo/
          touch preview-repo/.nojekyll

          git -C preview-repo config user.name "github-actions[bot]"
          git -C preview-repo config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C preview-repo add -A

          if git -C preview-repo diff --cached --quiet; then
            echo "No preview changes to deploy."
          else
            git -C preview-repo commit -m "Deploy preview ${GITHUB_SHA}"
            git -C preview-repo push origin main
          fi

      - name: Comment preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- cidadao-digital-seguro-preview -->';
            const previewUrl = `https://aicyberproject.github.io/cidadao-digital-seguro-preview/?preview=${context.payload.pull_request.head.sha}`;
            const body = [
              marker,
              'Preview automatico disponivel em:',
              previewUrl,
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
